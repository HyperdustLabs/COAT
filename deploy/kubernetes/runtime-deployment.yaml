apiVersion: apps/v1
kind: Deployment
metadata:
  name: COAT-runtime
  labels:
    app.kubernetes.io/name: COAT-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: COAT-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: COAT-runtime
    spec:
      containers:
        - name: COAT-runtime
          image: COAT-runtime:latest
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/COAT-runtime/config.yaml"]
          ports:
            - containerPort: 7878
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7878
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/COAT-runtime
              readOnly: true
            - name: data
              mountPath: /var/lib/COAT-runtime
      volumes:
        - name: config
          configMap:
            name: COAT-runtime-config
        - name: data
          persistentVolumeClaim:
            claimName: COAT-runtime-data
