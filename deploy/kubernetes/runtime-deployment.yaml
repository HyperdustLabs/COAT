apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencoat-runtime
  labels:
    app.kubernetes.io/name: opencoat-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opencoat-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencoat-runtime
    spec:
      containers:
        - name: opencoat-runtime
          image: opencoat-runtime:latest
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/opencoat/config.yaml"]
          ports:
            - containerPort: 7878
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7878
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/opencoat
              readOnly: true
            - name: data
              mountPath: /var/lib/opencoat
      volumes:
        - name: config
          configMap:
            name: opencoat-runtime-config
        - name: data
          persistentVolumeClaim:
            claimName: opencoat-runtime-data
