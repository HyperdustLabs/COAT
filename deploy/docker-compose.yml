version: "3.9"

services:
  opencoat-runtime:
    build:
      context: ..
      dockerfile: packages/opencoat-runtime/docker/Dockerfile
    image: opencoat-runtime:dev
    container_name: opencoat-runtime
    environment:
      OPENCOAT_LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - ./compose.dev.config.yaml:/etc/opencoat/config.yaml:ro
      - opencoat-data:/var/lib/opencoat
    restart: unless-stopped

volumes:
  opencoat-data: {}
