name: Release

# Publishes all 8 `opencoat-runtime-*` wheels + sdists.
#
# Two trigger modes:
#   * `workflow_dispatch` with `target: testpypi`  → publishes to test.pypi.org
#     (manual only, never on tag — TestPyPI is for smoke tests).
#   * git tag matching `v*.*.*`                    → publishes to pypi.org.
#
# Authentication: PyPI Trusted Publishing (OIDC). No long-lived API tokens.
# Each project (8 of them) must be pre-registered as a "Pending Publisher"
# pointing at this workflow before the first publish; see RELEASING.md.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build all wheels + sdists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build every package
        run: |
          rm -rf dist/
          for pkg in packages/*/; do
            (cd "$pkg" && uv build)
          done

      - name: List artefacts
        run: ls -la dist/

      - name: twine check
        run: uv run --with twine twine check dist/*.whl dist/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/opencoat-runtime-cli/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI may already have a previous test of the same version;
          # skip the conflict instead of failing the whole workflow.
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/opencoat-runtime-cli/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
