name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check broken links (basic)
        run: |
          # Placeholder — replace with `lychee` or `markdown-link-check` at M2.
          grep -RIl "](docs/" docs/ || true
