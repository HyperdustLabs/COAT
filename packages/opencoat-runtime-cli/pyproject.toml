[project]
name = "opencoat-runtime-cli"
version = "0.0.1"
description = "OpenCOAT Runtime — command-line interface."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLabs" }]
dependencies = [
  "opencoat-runtime-protocol",
  "opencoat-runtime-core",
  "opencoat-runtime-storage",
  "opencoat-runtime-daemon",
  "pyyaml>=6.0",
]

[project.scripts]
opencoat = "opencoat_runtime_cli.main:main"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencoat_runtime_cli"]
