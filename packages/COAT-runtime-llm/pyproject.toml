[project]
name = "COAT-runtime-llm"
version = "0.0.1"
description = "LLM and Embedder clients for the COAT Runtime (openai, anthropic, azure, ollama, stub)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLab" }]
dependencies = [
  "COAT-runtime-protocol",
  "COAT-runtime-core",
]

[project.optional-dependencies]
openai    = ["openai>=1.40"]
anthropic = ["anthropic>=0.30"]
azure     = ["openai>=1.40"]
ollama    = ["httpx>=0.27"]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["COAT_runtime_llm"]
