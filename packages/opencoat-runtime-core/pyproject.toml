[project]
name = "opencoat-runtime-core"
version = "0.1.0"
description = "L2 pure-logic core for the OpenCOAT Runtime: concern/joinpoint/pointcut/advice/weaving/copr/coordinator/resolver/dcn/meta/loops/ports."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "HyperdustLabs" }]
dependencies = [
    "opencoat-runtime-protocol>=0.1.0,<0.2.0",
    "pydantic>=2.7",
]
keywords = [
    "opencoat",
    "agent-runtime",
    "concerns",
    "aop",
    "joinpoint",
    "pointcut",
    "weaving",
    "dcn",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/HyperdustLabs/OpenCOAT"
Repository = "https://github.com/HyperdustLabs/OpenCOAT"
Issues = "https://github.com/HyperdustLabs/OpenCOAT/issues"
Documentation = "https://github.com/HyperdustLabs/OpenCOAT/tree/main/docs"
Changelog = "https://github.com/HyperdustLabs/OpenCOAT/releases"
[build-system]
requires = [
    "hatchling>=1.27",
]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencoat_runtime_core"]
