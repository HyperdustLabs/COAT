# OpenCOAT Runtime daemon — default configuration.
# Overlays apply in order: CLI flags > env (OPENCOAT_*) > config file > this file.

runtime:
  schema_version: "0.2"
  loops:
    heartbeat_interval_seconds: 30
  budgets:
    max_active_concerns: 12
    max_injection_tokens: 800
    max_advice_per_concern: 2

storage:
  concern_store:
    kind: memory
  dcn_store:
    kind: memory

llm:
  provider: stub
  timeout_seconds: 20

ipc:
  inproc:
    enabled: true
  unix_socket:
    enabled: false
    path: /run/opencoat.sock
  # HTTP JSON-RPC is the default transport for `opencoat runtime up`,
  # `opencoat concern …`, `opencoat dcn …`, and any first-party host SDK
  # using `Client.connect("http://…")`. Disable explicitly for embedded
  # single-process usage (see ADR 0005); the in-proc dispatcher remains
  # available regardless.
  http:
    enabled: true
    host: 127.0.0.1
    port: 7878
  grpc:
    enabled: false

observability:
  log_level: INFO
  otel_endpoint: null

plugins:
  hosts: []
  matchers: []
  advisors: []
