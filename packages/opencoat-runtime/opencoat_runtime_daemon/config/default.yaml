# OpenCOAT Runtime daemon — default configuration.
# Overlays apply in order: CLI flags > env (OPENCOAT_*) > config file > this file.

runtime:
  schema_version: "0.2"
  loops:
    heartbeat_interval_seconds: 30
  budgets:
    max_active_concerns: 12
    max_injection_tokens: 800
    max_advice_per_concern: 2

# Production-oriented defaults: sqlite under ~/.opencoat/ so concerns and
# DCN activation history survive daemon restarts. On startup the daemon
# performs a one-shot full scan (iter_all + activation_log) to warm OS /
# sqlite page cache; swap to lazy loading later if data grows large.
# Hermetic tests set OPENCOAT_TEST_MEMORY_STORES=1 to overlay memory stores.
# Override paths or switch backends in ~/.opencoat/daemon.yaml or via
# ``opencoat configure daemon``.
storage:
  concern_store:
    kind: sqlite
    path: ~/.opencoat/concerns.sqlite
  dcn_store:
    kind: sqlite
    path: ~/.opencoat/dcn.sqlite

# LLM provider for the daemon's ConcernExtractor / AdviceGenerator and
# any host that drives the runtime over HTTP. ``auto`` picks the first
# provider whose marker env var is present (``OPENAI_API_KEY`` →
# ``ANTHROPIC_API_KEY`` → ``AZURE_OPENAI_API_KEY``+``AZURE_OPENAI_DEPLOYMENT``);
# if nothing is found the daemon falls back to a stub and logs a loud
# WARNING — so concern extraction silently returns 0 candidates is
# impossible on a fresh install. Pin ``provider: openai`` etc. when
# you want the daemon to refuse to start without credentials, or
# ``provider: stub`` for hermetic CI / examples.
# See docs/config/daemon.yaml.example for a fully annotated production
# config.
llm:
  provider: auto
  timeout_seconds: 20

ipc:
  inproc:
    enabled: true
  unix_socket:
    enabled: false
    path: /run/opencoat.sock
  # HTTP JSON-RPC is the default transport for `opencoat runtime up`,
  # `opencoat concern …`, `opencoat dcn …`, and any first-party host SDK
  # using `Client.connect("http://…")`. Disable explicitly for embedded
  # single-process usage (see ADR 0005); the in-proc dispatcher remains
  # available regardless.
  http:
    enabled: true
    host: 127.0.0.1
    port: 7878
    path: /rpc
  grpc:
    enabled: false

observability:
  log_level: INFO
  otel_endpoint: null

plugins:
  hosts: []
  matchers: []
  advisors: []
