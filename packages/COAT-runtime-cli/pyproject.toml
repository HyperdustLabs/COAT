[project]
name = "COAT-runtime-cli"
version = "0.0.1"
description = "COATr — command line for the COAT Runtime."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLab" }]
dependencies = [
  "COAT-runtime-protocol",
  "COAT-runtime-core",
  "COAT-runtime-daemon",
]

[project.scripts]
COATr = "COAT_runtime_cli.main:main"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["COAT_runtime_cli"]
