[project]
name = "opencoat-runtime-daemon"
version = "0.0.1"
description = "Long-running daemon for the OpenCOAT Runtime: scheduler, workers, IPC, HTTP/JSON-RPC API."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLabs" }]
dependencies = [
  "opencoat-runtime-protocol",
  "opencoat-runtime-core",
  "opencoat-runtime-storage",
  "opencoat-runtime-llm",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
http = ["fastapi>=0.110", "uvicorn>=0.30"]
grpc = ["grpcio>=1.60", "grpcio-tools>=1.60"]

[project.scripts]
opencoat-daemon = "opencoat_runtime_daemon.__main__:main"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencoat_runtime_daemon"]

[tool.hatch.build.targets.wheel.force-include]
"opencoat_runtime_daemon/config" = "opencoat_runtime_daemon/config"
