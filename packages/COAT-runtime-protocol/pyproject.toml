[project]
name = "COAT-runtime-protocol"
version = "0.0.1"
description = "JSON Schemas + pydantic envelopes for the COAT Runtime data contracts"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLab" }]
dependencies = [
  "pydantic>=2.7",
  "jsonschema>=4.21",
]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["COAT_runtime_protocol"]

[tool.hatch.build.targets.wheel.sources]
"COAT_runtime_protocol" = "COAT_runtime_protocol"

[tool.hatch.build.targets.wheel.force-include]
"COAT_runtime_protocol/schemas" = "COAT_runtime_protocol/schemas"
"COAT_runtime_protocol/openapi" = "COAT_runtime_protocol/openapi"
