[project]
name = "COAT-runtime-storage"
version = "0.0.1"
description = "ConcernStore / DCNStore backends for the COAT Runtime (memory, sqlite, postgres, jsonl, vector)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLab" }]
dependencies = [
  "COAT-runtime-protocol",
  "COAT-runtime-core",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]
vector   = ["faiss-cpu>=1.7"]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["COAT_runtime_storage"]
