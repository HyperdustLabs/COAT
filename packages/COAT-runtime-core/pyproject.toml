[project]
name = "COAT-runtime-core"
version = "0.0.1"
description = "L2 pure-logic core for the COAT Runtime: concern/joinpoint/pointcut/advice/weaving/copr/coordinator/resolver/dcn/meta/loops/ports."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLab" }]
dependencies = [
  "COAT-runtime-protocol",
  "pydantic>=2.7",
]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["COAT_runtime_core"]
