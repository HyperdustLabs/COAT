[project]
name = "opencoat-runtime-host-sdk"
version = "0.0.1"
description = "Host-side SDK for the OpenCOAT Runtime — joinpoint emitter, injection consumer, transports."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "HyperdustLabs" }]
dependencies = [
  "opencoat-runtime-protocol",
]

[project.optional-dependencies]
http = ["httpx>=0.27"]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencoat_runtime_host_sdk"]
